name: Check

on:
  pull_request:
    branches:
      - master
      - develop
  push:
    branches:
      - master
      - develop

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compute TAG_NAME for checks
        run: |
          TAG_NAME=$(./scripts/compute-headver.js)
          if [ -z "$TAG_NAME" ]; then
            echo "::error::compute-headver.js가 비어 있는 TAG_NAME을 반환했습니다."
            exit 1
          fi

          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "Using TAG_NAME=$TAG_NAME"

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Run check via just
        run: just check
