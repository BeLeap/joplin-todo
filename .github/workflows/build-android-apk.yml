name: Build Android APK

on:
  push:
    branches:
      - develop

concurrency:
  group: build-android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Expo/EAS local build data
        uses: actions/cache@v4
        with:
          path: |
            ~/.eas
            ~/.expo
          key: ${{ runner.os }}-expo-eas-${{ hashFiles('package-lock.json', 'eas.json', 'app.json', 'app.config.*') }}
          restore-keys: |
            ${{ runner.os }}-expo-eas-

      - name: Generate Android project (Expo prebuild)
        run: npx expo prebuild --platform android --non-interactive --no-install

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          # Safe now because prebuild creates android/gradle files before setup-java cache scan.
          cache: gradle

      - name: Build release APK via EAS CLI
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_LOCAL_BUILD_SKIP_CLEANUP: 1
        run: npx eas-cli@16.20.0 build --platform android --profile preview --local --output app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app-release.apk
          if-no-files-found: error
