name: Build Android APK

permissions:
  contents: write

on:
  push:
    branches:
      - develop

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compute HeadVer version
        run: |
          HEADVER_VERSION=$(node -e "const appConfig = require('./app.config.js'); process.stdout.write(appConfig({ config: {} }).version);")

          if [ -z "$HEADVER_VERSION" ]; then
            echo "::error::HEADVER_VERSION 계산 결과가 비어 있습니다."
            exit 1
          fi

          echo "HEADVER_VERSION=$HEADVER_VERSION" >> "$GITHUB_ENV"

          echo "Resolved HEADVER_VERSION=$HEADVER_VERSION"

      - name: Generate Android project (Expo prebuild)
        run: |
          echo "Using HEADVER_VERSION=$HEADVER_VERSION"
          npx expo prebuild --platform android --non-interactive --no-install

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          # Safe now because prebuild creates android/gradle files before setup-java cache scan.
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x android/gradlew

      - name: Build release APK via Gradle
        run: |
          echo "Using HEADVER_VERSION=$HEADVER_VERSION"
          cd android
          ./gradlew :app:assembleRelease

      - name: Copy APK artifact
        run: cp android/app/build/outputs/apk/release/app-release.apk app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app-release.apk
          if-no-files-found: error

      - name: Create and push version tag
        run: |
          if [ -z "$HEADVER_VERSION" ]; then
            echo "::error::HEADVER_VERSION 환경변수가 비어 있습니다."
            exit 1
          fi

          if git ls-remote --tags origin "refs/tags/$HEADVER_VERSION" | grep -q "$HEADVER_VERSION"; then
            echo "::error::Tag already exists on origin: $HEADVER_VERSION"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$HEADVER_VERSION" -m "Automated version tag for $GITHUB_SHA"
          git push origin "$HEADVER_VERSION"
