name: Build Android APK

permissions:
  contents: write

on:
  push:
    branches:
      - develop

jobs:
  create-and-push-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-tag-${{ github.ref }}
      cancel-in-progress: false
    outputs:
      tag_name: ${{ steps.compute_tag.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compute TAG_NAME version
        id: compute_tag
        run: |
          TAG_NAME=$(./scripts/compute-headver.js)
          if [ -z "$TAG_NAME" ]; then
            echo "::error::compute-headver.js가 비어 있는 TAG_NAME을 반환했습니다."
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "Resolved TAG_NAME=$TAG_NAME"

      - name: Create and push version tag
        env:
          TAG_NAME: ${{ steps.compute_tag.outputs.tag_name }}
        run: |
          if git ls-remote --tags origin "refs/tags/$TAG_NAME" | grep -q "$TAG_NAME"; then
            echo "::error::Tag already exists on origin: $TAG_NAME"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Automated version tag for $GITHUB_SHA"
          git push origin "$TAG_NAME"

  build-apk:
    needs: create-and-push-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      TAG_NAME: ${{ needs.create-and-push-tag.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: refs/tags/${{ env.TAG_NAME }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate TAG_NAME
        run: |
          if [ -z "$TAG_NAME" ]; then
            echo "::error::TAG_NAME output이 비어 있어 APK 빌드를 진행할 수 없습니다."
            exit 1
          fi

          echo "Using TAG_NAME=$TAG_NAME"

      - name: Generate Android project (Expo prebuild)
        run: |
          echo "Using TAG_NAME=$TAG_NAME"
          npx expo prebuild --platform android --non-interactive --no-install

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          # Safe now because prebuild creates android/gradle files before setup-java cache scan.
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x android/gradlew

      - name: Build release APK via Gradle
        run: |
          echo "Using TAG_NAME=$TAG_NAME"
          cd android
          ./gradlew :app:assembleRelease

      - name: Copy APK artifact
        run: cp android/app/build/outputs/apk/release/app-release.apk app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ env.TAG_NAME }}
          path: app-release.apk
          if-no-files-found: error
