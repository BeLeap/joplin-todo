name: TypeScript Check

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  tsc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npx tsc --noEmit
